networks:
  edge:
    driver: overlay
    attachable: true
    driver_opts:
      encrypted: "true"
  internal:
    driver: overlay
    attachable: true
    driver_opts:
      encrypted: "true"

volumes:
  grafana_data:
  homepage_config:
  portainer_data:
  prometheus_data:
  romm_data:
  traefik_letsencrypt:
  vaultwarden_data:

secrets:
  homelab_acme_email:
    external: true
  homelab_cloudflare_api_token:
    external: true
  homelab_vaultwarden_admin_token:
    external: true
  homelab_grafana_admin_password:
    external: true

services:
  traefik:
    image: traefik:v3.3
    command:
      - /bin/sh
      - -ec
      - |
        export ACME_EMAIL="$(cat /run/secrets/homelab_acme_email)"
        export CF_DNS_API_TOKEN="$(cat /run/secrets/homelab_cloudflare_api_token)"
        exec traefik \
          --providers.docker=true \
          --providers.docker.swarmMode=true \
          --providers.docker.exposedbydefault=false \
          --providers.docker.network=${STACK_NAME}_edge \
          --entrypoints.web.address=:80 \
          --entrypoints.web.http.redirections.entrypoint.to=websecure \
          --entrypoints.web.http.redirections.entrypoint.scheme=https \
          --entrypoints.websecure.address=:443 \
          --api.dashboard=true \
          --api.insecure=false \
          --ping=true \
          --accesslog=true \
          --certificatesresolvers.le.acme.email="${ACME_EMAIL}" \
          --certificatesresolvers.le.acme.storage=/letsencrypt/acme.json \
          --certificatesresolvers.le.acme.dnschallenge=true \
          --certificatesresolvers.le.acme.dnschallenge.provider=cloudflare \
          --certificatesresolvers.le.acme.dnschallenge.delaybeforecheck=20
    ports:
      - target: 80
        published: 80
        protocol: tcp
        mode: host
      - target: 443
        published: 443
        protocol: tcp
        mode: host
    networks:
      - edge
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_letsencrypt:/letsencrypt
    secrets:
      - homelab_acme_email
      - homelab_cloudflare_api_token
    deploy:
      mode: global
      placement:
        constraints:
          - node.role == manager
      update_config:
        order: start-first
        parallelism: 1
      restart_policy:
        condition: on-failure
    labels:
      - traefik.enable=true
      - traefik.docker.network=${STACK_NAME}_edge
      - traefik.http.routers.traefik.rule=Host(`traefik.${BASE_DOMAIN}`)
      - traefik.http.routers.traefik.entrypoints=websecure
      - traefik.http.routers.traefik.tls=true
      - traefik.http.routers.traefik.tls.certresolver=le
      - traefik.http.routers.traefik.service=api@internal
      - traefik.http.routers.traefik.middlewares=secure-headers@docker
      - traefik.http.middlewares.secure-headers.headers.browserXssFilter=true
      - traefik.http.middlewares.secure-headers.headers.contentTypeNosniff=true
      - traefik.http.middlewares.secure-headers.headers.forceSTSHeader=true
      - traefik.http.middlewares.secure-headers.headers.frameDeny=true
      - traefik.http.middlewares.secure-headers.headers.referrerPolicy=strict-origin-when-cross-origin
      - traefik.http.middlewares.secure-headers.headers.stsIncludeSubdomains=true
      - traefik.http.middlewares.secure-headers.headers.stsPreload=true
      - traefik.http.middlewares.secure-headers.headers.stsSeconds=31536000

  homepage:
    image: ghcr.io/gethomepage/homepage:v1.2.0
    environment:
      TZ: ${TIMEZONE}
    networks:
      - edge
      - internal
    volumes:
      - homepage_config:/app/config
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.homelab.tag.bootstrap == true
      restart_policy:
        condition: on-failure
    labels:
      - traefik.enable=true
      - traefik.docker.network=${STACK_NAME}_edge
      - traefik.http.routers.homepage.rule=Host(`home.${BASE_DOMAIN}`)
      - traefik.http.routers.homepage.entrypoints=websecure
      - traefik.http.routers.homepage.tls=true
      - traefik.http.routers.homepage.tls.certresolver=le
      - traefik.http.routers.homepage.middlewares=secure-headers@docker
      - traefik.http.services.homepage.loadbalancer.server.port=3000

  portainer-agent:
    image: portainer/agent:2.21.5
    networks:
      - internal
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/volumes:/var/lib/docker/volumes
    deploy:
      mode: global
      placement:
        constraints:
          - node.platform.os == linux
      restart_policy:
        condition: on-failure

  portainer:
    image: portainer/portainer-ce:2.21.5
    command: -H tcp://tasks.portainer-agent:9001 --tlsskipverify
    networks:
      - edge
      - internal
    volumes:
      - portainer_data:/data
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.homelab.tag.bootstrap == true
      restart_policy:
        condition: on-failure
    labels:
      - traefik.enable=true
      - traefik.docker.network=${STACK_NAME}_edge
      - traefik.http.routers.portainer.rule=Host(`portainer.${BASE_DOMAIN}`)
      - traefik.http.routers.portainer.entrypoints=websecure
      - traefik.http.routers.portainer.tls=true
      - traefik.http.routers.portainer.tls.certresolver=le
      - traefik.http.routers.portainer.middlewares=secure-headers@docker
      - traefik.http.services.portainer.loadbalancer.server.port=9000

  vaultwarden:
    image: vaultwarden/server:1.34.3
    command:
      - /bin/sh
      - -ec
      - |
        export ADMIN_TOKEN="$(cat /run/secrets/homelab_vaultwarden_admin_token)"
        exec /start.sh
    environment:
      TZ: ${TIMEZONE}
      SIGNUPS_ALLOWED: "false"
    networks:
      - edge
      - internal
    volumes:
      - vaultwarden_data:/data
    secrets:
      - homelab_vaultwarden_admin_token
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.homelab.tag.bootstrap == true
      restart_policy:
        condition: on-failure
    labels:
      - traefik.enable=true
      - traefik.docker.network=${STACK_NAME}_edge
      - traefik.http.routers.vaultwarden.rule=Host(`vaultwarden.${BASE_DOMAIN}`)
      - traefik.http.routers.vaultwarden.entrypoints=websecure
      - traefik.http.routers.vaultwarden.tls=true
      - traefik.http.routers.vaultwarden.tls.certresolver=le
      - traefik.http.routers.vaultwarden.middlewares=secure-headers@docker
      - traefik.http.services.vaultwarden.loadbalancer.server.port=80

  romm:
    image: ghcr.io/rommapp/romm:latest
    environment:
      TZ: ${TIMEZONE}
    networks:
      - edge
      - internal
    volumes:
      - romm_data:/romm/data
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.homelab.tag.bootstrap == true
      restart_policy:
        condition: on-failure
    labels:
      - traefik.enable=true
      - traefik.docker.network=${STACK_NAME}_edge
      - traefik.http.routers.romm.rule=Host(`romm.${BASE_DOMAIN}`)
      - traefik.http.routers.romm.entrypoints=websecure
      - traefik.http.routers.romm.tls=true
      - traefik.http.routers.romm.tls.certresolver=le
      - traefik.http.routers.romm.middlewares=secure-headers@docker
      - traefik.http.services.romm.loadbalancer.server.port=8080

  node-exporter:
    image: prom/node-exporter:v1.8.2
    command:
      - --path.rootfs=/host
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --collector.filesystem.mount-points-exclude=^/(dev|proc|sys|var/lib/docker/.+)($|/)
    networks:
      - internal
    volumes:
      - /:/host:ro,rslave
    deploy:
      mode: global
      placement:
        constraints:
          - node.platform.os == linux
      restart_policy:
        condition: on-failure

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.2
    command:
      - --docker_only=true
      - --housekeeping_interval=30s
    networks:
      - internal
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /sys/fs/cgroup:/sys/fs/cgroup:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro
    deploy:
      mode: global
      placement:
        constraints:
          - node.platform.os == linux
      restart_policy:
        condition: on-failure

  prometheus:
    image: prom/prometheus:v2.54.1
    entrypoint:
      - /bin/sh
      - -ec
    command:
      - |
        cat >/tmp/prometheus.yml <<'EOF'
        global:
          scrape_interval: 15s
          evaluation_interval: 15s

        scrape_configs:
          - job_name: prometheus
            static_configs:
              - targets:
                  - localhost:9090

          - job_name: node-exporter
            dns_sd_configs:
              - names:
                  - tasks.node-exporter
                type: A
                port: 9100

          - job_name: cadvisor
            dns_sd_configs:
              - names:
                  - tasks.cadvisor
                type: A
                port: 8080
        EOF

        exec /bin/prometheus \
          --config.file=/tmp/prometheus.yml \
          --storage.tsdb.path=/prometheus \
          --storage.tsdb.retention.time=15d \
          --web.enable-lifecycle
    networks:
      - internal
    volumes:
      - prometheus_data:/prometheus
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.homelab.tag.bootstrap == true
      restart_policy:
        condition: on-failure

  grafana:
    image: grafana/grafana:11.2.0
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD__FILE: /run/secrets/grafana_admin_password
      GF_SERVER_ROOT_URL: https://grafana.${BASE_DOMAIN}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_PATHS_PROVISIONING: /var/lib/grafana/provisioning
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/swarm-overview.json
    command:
      - /bin/sh
      - -ec
      - |
        mkdir -p /var/lib/grafana/provisioning/datasources
        mkdir -p /var/lib/grafana/provisioning/dashboards
        mkdir -p /var/lib/grafana/dashboards

        cat >/var/lib/grafana/provisioning/datasources/prometheus.yaml <<'EOF'
        apiVersion: 1
        datasources:
          - name: Prometheus
            type: prometheus
            access: proxy
            url: http://prometheus:9090
            isDefault: true
            editable: false
        EOF

        cat >/var/lib/grafana/provisioning/dashboards/dashboards.yaml <<'EOF'
        apiVersion: 1
        providers:
          - name: Homelab
            orgId: 1
            folder: Homelab
            type: file
            disableDeletion: false
            editable: true
            options:
              path: /var/lib/grafana/dashboards
        EOF

        cat >/var/lib/grafana/dashboards/swarm-overview.json <<'EOF'
        {
          "annotations": {
            "list": [
              {
                "builtIn": 1,
                "datasource": {
                  "type": "grafana",
                  "uid": "-- Grafana --"
                },
                "enable": true,
                "hide": true,
                "iconColor": "rgba(0, 211, 255, 1)",
                "name": "Annotations & Alerts",
                "type": "dashboard"
              }
            ]
          },
          "editable": true,
          "fiscalYearStartMonth": 0,
          "graphTooltip": 0,
          "id": null,
          "links": [],
          "panels": [
            {
              "datasource": "Prometheus",
              "fieldConfig": {
                "defaults": {
                  "max": 100,
                  "min": 0,
                  "thresholds": {
                    "mode": "absolute",
                    "steps": [
                      {
                        "color": "green",
                        "value": null
                      },
                      {
                        "color": "orange",
                        "value": 70
                      },
                      {
                        "color": "red",
                        "value": 90
                      }
                    ]
                  },
                  "unit": "percent"
                },
                "overrides": []
              },
              "gridPos": {
                "h": 4,
                "w": 6,
                "x": 0,
                "y": 0
              },
              "id": 1,
              "options": {
                "colorMode": "value",
                "graphMode": "none",
                "justifyMode": "auto",
                "orientation": "auto",
                "reduceOptions": {
                  "calcs": [
                    "lastNotNull"
                  ],
                  "fields": "",
                  "values": false
                },
                "textMode": "auto"
              },
              "targets": [
                {
                  "expr": "100 - (avg(rate(node_cpu_seconds_total{job=\"node-exporter\",mode=\"idle\"}[5m])) * 100)",
                  "refId": "A"
                }
              ],
              "title": "Cluster CPU Used",
              "type": "stat"
            },
            {
              "datasource": "Prometheus",
              "fieldConfig": {
                "defaults": {
                  "max": 100,
                  "min": 0,
                  "thresholds": {
                    "mode": "absolute",
                    "steps": [
                      {
                        "color": "green",
                        "value": null
                      },
                      {
                        "color": "orange",
                        "value": 75
                      },
                      {
                        "color": "red",
                        "value": 90
                      }
                    ]
                  },
                  "unit": "percent"
                },
                "overrides": []
              },
              "gridPos": {
                "h": 4,
                "w": 6,
                "x": 6,
                "y": 0
              },
              "id": 2,
              "options": {
                "colorMode": "value",
                "graphMode": "none",
                "justifyMode": "auto",
                "orientation": "auto",
                "reduceOptions": {
                  "calcs": [
                    "lastNotNull"
                  ],
                  "fields": "",
                  "values": false
                },
                "textMode": "auto"
              },
              "targets": [
                {
                  "expr": "(1 - (sum(node_memory_MemAvailable_bytes{job=\"node-exporter\"}) / sum(node_memory_MemTotal_bytes{job=\"node-exporter\"}))) * 100",
                  "refId": "A"
                }
              ],
              "title": "Cluster Memory Used",
              "type": "stat"
            },
            {
              "datasource": "Prometheus",
              "fieldConfig": {
                "defaults": {
                  "unit": "none"
                },
                "overrides": []
              },
              "gridPos": {
                "h": 4,
                "w": 6,
                "x": 12,
                "y": 0
              },
              "id": 3,
              "options": {
                "colorMode": "value",
                "graphMode": "none",
                "justifyMode": "auto",
                "orientation": "auto",
                "reduceOptions": {
                  "calcs": [
                    "lastNotNull"
                  ],
                  "fields": "",
                  "values": false
                },
                "textMode": "value"
              },
              "targets": [
                {
                  "expr": "count(count by (instance) (up{job=\"node-exporter\"} == 1))",
                  "refId": "A"
                }
              ],
              "title": "Active Nodes",
              "type": "stat"
            },
            {
              "datasource": "Prometheus",
              "fieldConfig": {
                "defaults": {
                  "unit": "none"
                },
                "overrides": []
              },
              "gridPos": {
                "h": 4,
                "w": 6,
                "x": 18,
                "y": 0
              },
              "id": 4,
              "options": {
                "colorMode": "value",
                "graphMode": "none",
                "justifyMode": "auto",
                "orientation": "auto",
                "reduceOptions": {
                  "calcs": [
                    "lastNotNull"
                  ],
                  "fields": "",
                  "values": false
                },
                "textMode": "value"
              },
              "targets": [
                {
                  "expr": "count(count by (container_label_com_docker_swarm_service_name) (container_memory_working_set_bytes{job=\"cadvisor\",container_label_com_docker_swarm_service_name!=\"\"}))",
                  "refId": "A"
                }
              ],
              "title": "Active Services",
              "type": "stat"
            },
            {
              "datasource": "Prometheus",
              "fieldConfig": {
                "defaults": {
                  "max": 100,
                  "min": 0,
                  "unit": "percent"
                },
                "overrides": []
              },
              "gridPos": {
                "h": 8,
                "w": 12,
                "x": 0,
                "y": 4
              },
              "id": 5,
              "options": {
                "legend": {
                  "displayMode": "table",
                  "placement": "bottom"
                },
                "tooltip": {
                  "mode": "multi",
                  "sort": "desc"
                }
              },
              "targets": [
                {
                  "expr": "100 - (avg by (instance) (rate(node_cpu_seconds_total{job=\"node-exporter\",mode=\"idle\"}[5m])) * 100)",
                  "legendFormat": "{{instance}}",
                  "refId": "A"
                }
              ],
              "title": "CPU Usage by Node",
              "type": "timeseries"
            },
            {
              "datasource": "Prometheus",
              "fieldConfig": {
                "defaults": {
                  "max": 100,
                  "min": 0,
                  "unit": "percent"
                },
                "overrides": []
              },
              "gridPos": {
                "h": 8,
                "w": 12,
                "x": 12,
                "y": 4
              },
              "id": 6,
              "options": {
                "legend": {
                  "displayMode": "table",
                  "placement": "bottom"
                },
                "tooltip": {
                  "mode": "multi",
                  "sort": "desc"
                }
              },
              "targets": [
                {
                  "expr": "(1 - (node_memory_MemAvailable_bytes{job=\"node-exporter\"} / node_memory_MemTotal_bytes{job=\"node-exporter\"})) * 100",
                  "legendFormat": "{{instance}}",
                  "refId": "A"
                }
              ],
              "title": "Memory Usage by Node",
              "type": "timeseries"
            },
            {
              "datasource": "Prometheus",
              "fieldConfig": {
                "defaults": {
                  "unit": "cores"
                },
                "overrides": []
              },
              "gridPos": {
                "h": 8,
                "w": 12,
                "x": 0,
                "y": 12
              },
              "id": 7,
              "options": {
                "legend": {
                  "displayMode": "table",
                  "placement": "bottom"
                },
                "tooltip": {
                  "mode": "multi",
                  "sort": "desc"
                }
              },
              "targets": [
                {
                  "expr": "sum by (container_label_com_docker_swarm_service_name) (rate(container_cpu_usage_seconds_total{job=\"cadvisor\",container_label_com_docker_swarm_service_name!=\"\"}[5m]))",
                  "legendFormat": "{{container_label_com_docker_swarm_service_name}}",
                  "refId": "A"
                }
              ],
              "title": "CPU Usage by Service",
              "type": "timeseries"
            },
            {
              "datasource": "Prometheus",
              "fieldConfig": {
                "defaults": {
                  "unit": "bytes"
                },
                "overrides": []
              },
              "gridPos": {
                "h": 8,
                "w": 12,
                "x": 12,
                "y": 12
              },
              "id": 8,
              "options": {
                "legend": {
                  "displayMode": "table",
                  "placement": "bottom"
                },
                "tooltip": {
                  "mode": "multi",
                  "sort": "desc"
                }
              },
              "targets": [
                {
                  "expr": "sum by (container_label_com_docker_swarm_service_name) (container_memory_working_set_bytes{job=\"cadvisor\",container_label_com_docker_swarm_service_name!=\"\"})",
                  "legendFormat": "{{container_label_com_docker_swarm_service_name}}",
                  "refId": "A"
                }
              ],
              "title": "Memory Usage by Service",
              "type": "timeseries"
            },
            {
              "datasource": "Prometheus",
              "fieldConfig": {
                "defaults": {
                  "unit": "Bps"
                },
                "overrides": []
              },
              "gridPos": {
                "h": 8,
                "w": 24,
                "x": 0,
                "y": 20
              },
              "id": 9,
              "options": {
                "legend": {
                  "displayMode": "table",
                  "placement": "bottom"
                },
                "tooltip": {
                  "mode": "multi",
                  "sort": "desc"
                }
              },
              "targets": [
                {
                  "expr": "sum(rate(container_network_receive_bytes_total{job=\"cadvisor\",interface!=\"lo\"}[5m]))",
                  "legendFormat": "RX",
                  "refId": "A"
                },
                {
                  "expr": "sum(rate(container_network_transmit_bytes_total{job=\"cadvisor\",interface!=\"lo\"}[5m]))",
                  "legendFormat": "TX",
                  "refId": "B"
                }
              ],
              "title": "Cluster Network Throughput",
              "type": "timeseries"
            }
          ],
          "refresh": "15s",
          "schemaVersion": 39,
          "tags": [
            "swarm",
            "homelab"
          ],
          "templating": {
            "list": []
          },
          "time": {
            "from": "now-6h",
            "to": "now"
          },
          "timepicker": {},
          "timezone": "browser",
          "title": "Swarm Overview",
          "uid": "swarm-overview",
          "version": 1,
          "weekStart": ""
        }
        EOF

        exec /run.sh
    networks:
      - edge
      - internal
    volumes:
      - grafana_data:/var/lib/grafana
    secrets:
      - source: homelab_grafana_admin_password
        target: grafana_admin_password
        mode: 0400
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.homelab.tag.bootstrap == true
      restart_policy:
        condition: on-failure
    labels:
      - traefik.enable=true
      - traefik.docker.network=${STACK_NAME}_edge
      - traefik.http.routers.grafana.rule=Host(`grafana.${BASE_DOMAIN}`)
      - traefik.http.routers.grafana.entrypoints=websecure
      - traefik.http.routers.grafana.tls=true
      - traefik.http.routers.grafana.tls.certresolver=le
      - traefik.http.routers.grafana.middlewares=secure-headers@docker
      - traefik.http.services.grafana.loadbalancer.server.port=3000

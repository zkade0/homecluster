services:
  todo:
    image: ghcr.io/nkasco/dispatchtodoapp:latest
    entrypoint:
    - /bin/sh
    - -c
    - export AUTH_SECRET="$$(cat /run/secrets/DISPATCH_AUTH_SECRET)" && exec docker-entrypoint.sh sh /app/docker/entrypoint.sh
    environment:
      AUTH_TRUST_HOST: 'true'
      NEXTAUTH_URL: https://todo.${BASE_DOMAIN}
      DATABASE_URL: /app/data/dispatch.db
      TZ: ${TIMEZONE}
    volumes:
    - type: bind
      source: /mnt/homelab-data/todo/data
      target: /app/data
    secrets:
    - DISPATCH_AUTH_SECRET
    networks:
    - backend
    - edge
    deploy:
      labels:
      - traefik.enable=true
      - traefik.http.middlewares.todo-https-redirect.redirectscheme.permanent=true
      - traefik.http.middlewares.todo-https-redirect.redirectscheme.scheme=https
      - traefik.http.routers.todo-secure.entrypoints=websecure
      - traefik.http.routers.todo-secure.rule=Host(`${STACK_NAME}.${BASE_DOMAIN}`)
      - traefik.http.routers.todo-secure.service=todo
      - traefik.http.routers.todo-secure.tls=true
      - traefik.http.routers.todo.entrypoints=web
      - traefik.http.routers.todo.middlewares=todo-https-redirect
      - traefik.http.routers.todo.rule=Host(`${STACK_NAME}.${BASE_DOMAIN}`)
      - traefik.http.services.todo.loadbalancer.server.port=3000
      - traefik.swarm.network=edge
      mode: replicated
      replicas: 1
      placement:
        constraints:
        - node.platform.os == linux
      restart_policy:
        condition: any
      update_config:
        order: stop-first
        parallelism: 1
secrets:
  DISPATCH_AUTH_SECRET:
    external: true
    name: homelab_dispatch_auth_secret
networks:
  backend:
    driver: overlay
    attachable: true
    driver_opts:
      encrypted: 'true'
  edge:
    external: true

services:
  technitium-dns:
    image: technitium/dns-server:latest
    environment:
      TZ: ${TIMEZONE}
      DNS_SERVER_DOMAIN: dns.admin.${BASE_DOMAIN}
      DNS_SERVER_ADMIN_PASSWORD: ${TECHNITIUM_ADMIN_PASSWORD}
      DNS_SERVER_PREFER_IPV6: "false"
      DNS_SERVER_RECURSION: AllowOnlyForPrivateNetworks
      DNS_SERVER_RECURSION_NETWORK_ACL: 192.168.0.0/16,172.16.0.0/12,10.0.0.0/8,127.0.0.0/8,::1/128,fd00::/8,fe80::/10
      DNS_SERVER_WEB_SERVICE_HTTP_PORT: "5380"
      DNS_SERVER_WEB_SERVICE_HTTPS_PORT: "53443"
    ports:
      - target: 53
        published: 53
        protocol: udp
        mode: host
      - target: 53
        published: 53
        protocol: tcp
        mode: host
    # DNS is exposed directly; Web UI is only exposed through Traefik.
    # Single active task + Swarm ingress routing mesh keeps 192.168.8.10 stable.
    networks:
      - edge
    volumes:
      - technitium_shared_config:/etc/dns
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.platform.os == linux
          - node.hostname == k8s-0
      update_config:
        order: stop-first
        parallelism: 1
      restart_policy:
        condition: on-failure
      labels:
        - traefik.enable=true
        - traefik.swarm.network=edge
        - traefik.http.routers.technitium.rule=Host(`dns.admin.${BASE_DOMAIN}`)
        - traefik.http.routers.technitium.entrypoints=web
        - traefik.http.routers.technitium.service=technitium
        - traefik.http.services.technitium.loadbalancer.server.port=5380

volumes:
  technitium_shared_config:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/homelab-data/technitium/config

networks:
  edge:
    external: true

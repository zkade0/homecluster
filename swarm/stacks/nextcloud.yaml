services:
  nextcloud:
    image: docker.io/library/nextcloud:stable-apache
    environment:
      POSTGRES_HOST: db
      POSTGRES_DB: nextcloud
      POSTGRES_USER: nextcloud
      POSTGRES_PASSWORD_FILE: /run/secrets/NEXTCLOUD_DB_PASSWORD
      REDIS_HOST: redis
      NEXTCLOUD_ADMIN_USER: admin
      NEXTCLOUD_ADMIN_PASSWORD_FILE: /run/secrets/NEXTCLOUD_ADMIN_PASSWORD
      NEXTCLOUD_TRUSTED_DOMAINS: nextcloud.kadenzobel.com
      TZ: ${TIMEZONE}
    volumes:
    - type: bind
      source: /mnt/homelab-data/nextcloud/app
      target: /var/www/html
    - type: bind
      source: /mnt/homelab-data/nextcloud/data
      target: /var/www/html/data
    secrets:
    - NEXTCLOUD_DB_PASSWORD
    - NEXTCLOUD_ADMIN_PASSWORD
    networks:
    - backend
    - edge
    deploy:
      labels:
      - traefik.enable=true
      - traefik.http.middlewares.nextcloud-https-redirect.redirectscheme.permanent=true
      - traefik.http.middlewares.nextcloud-https-redirect.redirectscheme.scheme=https
      - traefik.http.routers.nextcloud-secure.entrypoints=websecure
      - traefik.http.routers.nextcloud-secure.rule=Host(`${STACK_NAME}.${BASE_DOMAIN}`)
      - traefik.http.routers.nextcloud-secure.service=nextcloud
      - traefik.http.routers.nextcloud-secure.tls=true
      - traefik.http.routers.nextcloud.entrypoints=web
      - traefik.http.routers.nextcloud.middlewares=nextcloud-https-redirect
      - traefik.http.routers.nextcloud.rule=Host(`${STACK_NAME}.${BASE_DOMAIN}`)
      - traefik.http.services.nextcloud.loadbalancer.server.port=80
      - traefik.swarm.network=edge
      mode: replicated
      replicas: 1
      placement:
        constraints:
        - node.platform.os == linux
      restart_policy:
        condition: any
      update_config:
        order: stop-first
        parallelism: 1
  db:
    image: docker.io/library/postgres:16-alpine
    environment:
      POSTGRES_DB: nextcloud
      POSTGRES_USER: nextcloud
      POSTGRES_PASSWORD_FILE: /run/secrets/NEXTCLOUD_DB_PASSWORD
      TZ: ${TIMEZONE}
    volumes:
    - type: bind
      source: /mnt/homelab-data/nextcloud/db
      target: /var/lib/postgresql/data
    secrets:
    - NEXTCLOUD_DB_PASSWORD
    networks:
    - backend
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
        - node.platform.os == linux
      restart_policy:
        condition: any
      update_config:
        order: stop-first
        parallelism: 1
  redis:
    image: docker.io/library/redis:7-alpine
    command:
    - redis-server
    - --appendonly
    - 'yes'
    volumes:
    - type: bind
      source: /mnt/homelab-data/nextcloud/redis
      target: /data
    networks:
    - backend
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
        - node.platform.os == linux
      restart_policy:
        condition: any
      update_config:
        order: stop-first
        parallelism: 1
    environment:
      TZ: ${TIMEZONE}
secrets:
  NEXTCLOUD_DB_PASSWORD:
    external: true
    name: homelab_nextcloud_db_password
  NEXTCLOUD_ADMIN_PASSWORD:
    external: true
    name: homelab_nextcloud_admin_password
networks:
  backend:
    driver: overlay
    attachable: true
    driver_opts:
      encrypted: 'true'
  edge:
    external: true

services:
  homer:
    image: b4bz/homer:latest
    environment:
      TZ: ${TIMEZONE}
      INIT_ASSETS: '0'
    volumes:
    - type: bind
      source: /mnt/homelab-data/homer/assets
      target: /www/assets
    networks:
    - backend
    - edge
    deploy:
      placement:
        constraints:
        - node.platform.os == linux
        - node.hostname == k8s-0
      labels:
      - traefik.enable=true
      - traefik.http.middlewares.homer-https-redirect.redirectscheme.permanent=true
      - traefik.http.middlewares.homer-https-redirect.redirectscheme.scheme=https
      - traefik.http.middlewares.homer-auth.basicauth.users=${DASH_BASIC_AUTH}
      - traefik.http.routers.homer-secure.entrypoints=websecure
      - traefik.http.routers.homer-secure.middlewares=homer-auth
      - traefik.http.routers.homer-secure.rule=Host(`dash.${BASE_DOMAIN}`)
      - traefik.http.routers.homer-secure.service=homer
      - traefik.http.routers.homer-secure.tls=true
      - traefik.http.routers.homer.entrypoints=web
      - traefik.http.routers.homer.middlewares=homer-https-redirect
      - traefik.http.routers.homer.rule=Host(`dash.${BASE_DOMAIN}`)
      - traefik.http.services.homer.loadbalancer.server.port=8080
      - traefik.swarm.network=edge
      mode: replicated
      replicas: 1
      restart_policy:
        condition: any
      update_config:
        order: stop-first
        parallelism: 1
networks:
  backend:
    driver: overlay
    attachable: true
    driver_opts:
      encrypted: 'true'
  edge:
    external: true

services:
  broker:
    image: docker.io/library/redis:8
    command:
      - redis-server
      - --save
      - "60"
      - "1"
      - --loglevel
      - warning
    volumes:
      - paperless_redis:/data
    networks:
      - backend
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.platform.os == linux
          - node.labels.homelab.paperless == true
      restart_policy:
        condition: on-failure

  gotenberg:
    image: docker.io/gotenberg/gotenberg:8.25
    command:
      - gotenberg
      - --chromium-disable-javascript=true
      - --chromium-allow-list=file:///tmp/.*
    networks:
      - backend
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.platform.os == linux
          - node.labels.homelab.paperless == true
      restart_policy:
        condition: on-failure

  tika:
    image: docker.io/apache/tika:latest
    networks:
      - backend
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.platform.os == linux
          - node.labels.homelab.paperless == true
      restart_policy:
        condition: on-failure

  paperless:
    image: ghcr.io/paperless-ngx/paperless-ngx:latest
    environment:
      USERMAP_UID: "1000"
      USERMAP_GID: "1000"
      PAPERLESS_REDIS: redis://broker:6379
      PAPERLESS_TIKA_ENABLED: "1"
      PAPERLESS_TIKA_GOTENBERG_ENDPOINT: http://gotenberg:3000
      PAPERLESS_TIKA_ENDPOINT: http://tika:9998
      PAPERLESS_URL: https://paperless.${BASE_DOMAIN}
      PAPERLESS_SECRET_KEY_FILE: /run/secrets/paperless_secret_key
      PAPERLESS_TIME_ZONE: ${TIMEZONE}
      PAPERLESS_OCR_LANGUAGE: ${PAPERLESS_OCR_LANGUAGE}
    networks:
      - backend
      - edge
    volumes:
      - paperless_data:/usr/src/paperless/data
      - paperless_media:/usr/src/paperless/media
      - paperless_export:/usr/src/paperless/export
      - paperless_consume:/usr/src/paperless/consume
    secrets:
      - source: homelab_paperless_secret_key
        target: paperless_secret_key
        mode: 0400
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.platform.os == linux
          - node.labels.homelab.paperless == true
      restart_policy:
        condition: on-failure
      update_config:
        order: start-first
        parallelism: 1
      labels:
        - traefik.enable=true
        - traefik.swarm.network=edge
        - traefik.http.middlewares.paperless-https-redirect.redirectscheme.scheme=https
        - traefik.http.middlewares.paperless-https-redirect.redirectscheme.permanent=true
        - traefik.http.routers.paperless.rule=Host(`paperless.${BASE_DOMAIN}`)
        - traefik.http.routers.paperless.entrypoints=web
        - traefik.http.routers.paperless.middlewares=paperless-https-redirect
        - traefik.http.routers.paperless-secure.rule=Host(`paperless.${BASE_DOMAIN}`)
        - traefik.http.routers.paperless-secure.entrypoints=websecure
        - traefik.http.routers.paperless-secure.tls=true
        - traefik.http.routers.paperless-secure.tls.certresolver=le
        - traefik.http.routers.paperless-secure.service=paperless
        - traefik.http.routers.paperless.service=paperless
        - traefik.http.services.paperless.loadbalancer.server.port=8000

networks:
  backend:
    driver: overlay
    internal: true
  edge:
    external: true

volumes:
  paperless_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/homelab-data/paperless/data

  paperless_media:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/homelab-data/paperless/media

  paperless_export:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/homelab-data/paperless/export

  paperless_consume:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/homelab-data/paperless/consume

  paperless_redis:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/homelab-data/paperless/redis

secrets:
  homelab_paperless_secret_key:
    external: true
